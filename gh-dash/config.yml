prSections:
  - title: Needs My Review
    filters: is:open review-requested:@me repo:EMS-Management-Consultants/EMServices-BillingRules repo:EMS-Management-Consultants/EMSmart2.0 repo:EMS-Management-Consultants/EMStatus repo:EMS-Management-Consultants/Emsmart2.0-Common
    layout:
      author:
        width: 15
      updatedAt:
        hidden: true
  - title: Assigned to Me
    filters: is:open assignee:@me repo:EMS-Management-Consultants/EMServices-BillingRules repo:EMS-Management-Consultants/EMSmart2.0 repo:EMS-Management-Consultants/EMStatus repo:EMS-Management-Consultants/Emsmart2.0-Common
    layout:
      author:
        width: 15
      updatedAt:
        hidden: true
  - title: My Pull Requests
    filters: is:open author:@me repo:EMS-Management-Consultants/EMServices-BillingRules repo:EMS-Management-Consultants/EMSmart2.0 repo:EMS-Management-Consultants/EMStatus repo:EMS-Management-Consultants/Emsmart2.0-Common
    layout:
      author:
        width: 15
      updatedAt:
        hidden: true

issuesSections:
  - title: My Issues
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me

defaults:
  preview:
    open: true
    width: 60
  prsLimit: 10
  issuesLimit: 10
  view: prs
  layout:
    prs:
      repo:
        width: 20
      author:
        width: 15
      assignees:
        hidden: true
      base:
        hidden: true
      lines:
        hidden: false
      state:
        hidden: false
      ci:
        hidden: false
      updatedAt:
        width: 8

repoPaths:
  EMS-Management-Consultants/EMSmart2.0: ~/code/Work/EMSmart2.0
  EMS-Management-Consultants/EMServices-BillingRules: ~/code/Work/BR

keybindings:
  prs:
    - key: c
      command: >
        tmux split-window -h -c '{{.RepoPath}}' 'gh pr checkout {{.PrNumber}} && bash'
      description: checkout PR in tmux split
    - key: C
      command: >
        gh pr comment {{.PrNumber}} --repo {{.RepoName}}
      description: comment on PR
    - key: d
      command: >
        gh pr diff {{.PrNumber}} --repo {{.RepoName}} | delta --side-by-side --line-numbers
      description: view diff (side-by-side)
    - key: v
      command: >
        gh pr view {{.PrNumber}} --repo {{.RepoName}}
      description: view PR details
    - key: o
      command: >
        gh pr view {{.PrNumber}} --repo {{.RepoName}} --web
      description: open PR in browser
    - key: r
      command: >
        gh pr review {{.PrNumber}} --repo {{.RepoName}}
      description: review PR (approve/comment/request changes)
    - key: m
      command: >
        gh pr merge {{.PrNumber}} --repo {{.RepoName}}
      description: merge PR
    - key: R
      command: >
        gh pr ready {{.PrNumber}} --repo {{.RepoName}}
      description: mark PR as ready for review
    - key: X
      command: >
        gh pr close {{.PrNumber}} --repo {{.RepoName}}
      description: close PR
    - key: W
      command: >
        bash -c 'cd "{{.RepoPath}}" && "$HOME/.local/bin/gh-pr-worktree" {{.PrNumber}}'
      description: checkout PR in worktree and open in Neovim

theme:
  ui:
    table:
      showSeparator: true
    sectionsShowCount: true

confirmQuit: false
